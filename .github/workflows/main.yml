name: Monitor Olímpica

on:
  schedule:
    # A las 8:00 a.m., 1:00 p.m. y 5:00 p.m. Hora Colombia
    - cron: "0 13,18,22 * * *"

  workflow_dispatch:

jobs:
  monitor:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
        
      - name: Ejecutar monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          JUMBO_DISCORD_WEBHOOK: ${{ secrets.JUMBO_DISCORD_WEBHOOK }}
          CRUZVERDE_DISCORD_WEBHOOK: ${{ secrets.CRUZVERDE_DISCORD_WEBHOOK }}
        run: |
          python main.py
