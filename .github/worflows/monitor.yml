name: Monitor Olímpica

on:
  schedule:
    # Cada hora
    - cron: '0 * * * *'

  workflow_dispatch:

jobs:
  monitor:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar monitor
        run: |
          python main.py